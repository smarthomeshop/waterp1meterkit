# Optional DSMR Reader forwarding package for WaterP1MeterKit.
#
# Include this package after the normal WaterP1MeterKit package and define:
#   dsmr_reader_host: "http://192.168.1.10:7777"
#   dsmr_reader_api_key: !secret dsmr_reader_api_key
#
# The API key is compiled into the ESPHome firmware. Keep your ESPHome YAML and
# secrets.yaml private.

http_request:
  timeout: 10s
  follow_redirects: false

text_sensor:
  - platform: dsmr
    telegram:
      id: dsmr_reader_raw_telegram
      name: "DSMR Reader Raw Telegram"
      internal: true
      on_value:
        then:
          - http_request.post:
              url: "${dsmr_reader_host}/api/v1/datalogger/dsmrreading"
              request_headers:
                Authorization: "Token ${dsmr_reader_api_key}"
                Content-Type: "application/x-www-form-urlencoded"
              body: !lambda |-
                std::string encoded;
                encoded.reserve(x.size() * 3);
                const char *hex = "0123456789ABCDEF";

                for (unsigned char c : x) {
                  const bool unreserved =
                      (c >= 'A' && c <= 'Z') || (c >= 'a' && c <= 'z') ||
                      (c >= '0' && c <= '9') || c == '-' || c == '_' ||
                      c == '.' || c == '~';

                  if (unreserved) {
                    encoded.push_back(static_cast<char>(c));
                  } else {
                    encoded.push_back('%');
                    encoded.push_back(hex[(c >> 4) & 0x0F]);
                    encoded.push_back(hex[c & 0x0F]);
                  }
                }

                return "telegram=" + encoded;
              on_response:
                then:
                  - logger.log:
                      level: DEBUG
                      format: "DSMR Reader accepted telegram"
              on_error:
                then:
                  - logger.log:
                      level: WARN
                      format: "DSMR Reader upload failed"
