# WaterP1MeterKit V4 WiFi Cloud Configuration
# Includes local Home Assistant support plus SmartHomeShop cloud sync over HTTP POST.

substitutions:
  firmware_manifest_url: "https://smarthomeshop.github.io/waterp1meterkit/waterp1meterkit-v4-wifi-cloud-manifest.json"

packages:
  base: !include base.yaml
  wifi: !include wifi.yaml
  cloud: !include cloud.yaml

dashboard_import:
  package_import_url: github://smarthomeshop/waterp1meterkit/waterp1meterkit-v4/waterp1meterkit-wifi-cloud.yaml@main
  import_full_config: false
