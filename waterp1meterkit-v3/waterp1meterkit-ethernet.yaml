# WaterP1MeterKit V3 Ethernet Configuration
# Local-only version (no cloud functionality)
# For cloud-enabled version, use waterp1meterkit-ethernet-cloud.yaml

substitutions:
  default_network: "Ethernet"

packages:
  base: !include base.yaml
  eth: !include eth.yaml

dashboard_import:
  package_import_url: github://smarthomeshop/waterp1meterkit/waterp1meterkit-v3/waterp1meterkit-ethernet.yaml@main
