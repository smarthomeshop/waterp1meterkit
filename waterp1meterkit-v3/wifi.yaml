# yamllint disable
# WiFi mixin for WaterP1MeterKit V3 variants
# Provides WiFi connectivity, captive portal, and improv provisioning

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: ${device_name}
    password: ${device_name}

captive_portal:

# Improv BLE (for WiFi provisioning via Bluetooth)
# After successful WiFi setup, opens the welcome page automatically
esp32_improv:
  authorizer: none
  next_url: "https://app.smarthomeshop.io/setup/welcome?device={{device_name}}&ip={{ip_address}}&cloud=${cloud_enabled}&hw=${hardware_version}"

# Improv Serial (for WiFi provisioning via USB)
# After successful WiFi setup via ESP Web Tools, opens the welcome page automatically
improv_serial:
  next_url: "https://app.smarthomeshop.io/setup/welcome?device={{device_name}}&ip={{ip_address}}&cloud=${cloud_enabled}&hw=${hardware_version}"

sensor:
  # WiFi signal strength
  - platform: wifi_signal
    id: sensor_wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 300s

text_sensor:
  # WiFi info sensors
  - platform: wifi_info
    ip_address:
      id: wifi_ip_address
      name: "${friendly_name} IP Address"
      icon: "mdi:network-outline"
    ssid:
      id: wifi_ssid
      name: "${friendly_name} Connected SSID"
    bssid:
      id: wifi_bssid
      name: "${friendly_name} Connected BSSID"
    # MAC address (used for cloud device identification if cloud enabled)
    mac_address:
      id: wifi_mac_address
      name: "${friendly_name} MAC Address"
      entity_category: diagnostic
      icon: "mdi:identifier"

  # Dummy sensor for cloud.yaml compatibility (ethernet variant uses this ID)
  - platform: template
    id: ethernet_ip_address
    internal: true
