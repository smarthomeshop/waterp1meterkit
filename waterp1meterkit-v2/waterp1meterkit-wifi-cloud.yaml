# WaterP1MeterKit V2 WiFi Configuration + Cloud
# Cloud sync is ALWAYS active - device auto-registers on boot
# User chose cloud firmware = user wants cloud sync

substitutions:
  default_network: "WiFi Cloud"

packages:
  base: !include base.yaml
  wifi: !include wifi.yaml
  cloud: !include cloud.yaml

dashboard_import:
  package_import_url: github://smarthomeshop/waterp1meterkit/waterp1meterkit-v2/waterp1meterkit-wifi-cloud.yaml@main
