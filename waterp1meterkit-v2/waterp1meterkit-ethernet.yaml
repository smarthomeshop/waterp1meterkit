# WaterP1MeterKit V2 Ethernet Configuration
# Local-only version (no cloud functionality)
# For cloud-enabled version, use waterp1meterkit-ethernet-cloud.yaml

substitutions:
  default_network: "Ethernet (local)"

packages:
  base: !include base.yaml
  eth: !include eth.yaml

dashboard_import:
  package_import_url: github://smarthomeshop/waterp1meterkit/waterp1meterkit-v2/waterp1meterkit-ethernet.yaml@main
  import_full_config: false
