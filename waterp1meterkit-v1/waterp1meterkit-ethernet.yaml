# WaterP1MeterKit V1 Ethernet Configuration
# Local-only version (no cloud functionality)
# For cloud-enabled version, use waterp1meterkit-ethernet-cloud.yaml

substitutions:
  default_network: "Ethernet"

packages:
  base: !include base.yaml
  eth: !include eth.yaml

dashboard_import:
  package_import_url: github://smarthomeshop/waterp1meterkit/waterp1meterkit-v1/waterp1meterkit-ethernet.yaml@main
  import_full_config: false
