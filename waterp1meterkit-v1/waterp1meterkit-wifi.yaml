# WaterP1MeterKit V1 WiFi Configuration
# Local-only version (no cloud functionality)
# For cloud-enabled version, use waterp1meterkit-wifi-cloud.yaml

substitutions:
  default_network: "WiFi"

packages:
  base: !include base.yaml
  wifi: !include wifi.yaml

dashboard_import:
  package_import_url: github://smarthomeshop/waterp1meterkit/waterp1meterkit-v1/waterp1meterkit-wifi.yaml@main
